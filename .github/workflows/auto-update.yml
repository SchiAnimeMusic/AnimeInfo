name: AnimeInfo Auto Update

permissions:
  contents: write

on:
  schedule:
    # 毎日日本時間午前10時（UTC午前1時）に実行
    - cron: '0 1 * * *'
  # 手動実行も可能
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Japanese Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Fetch playlist and generate reports
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python scripts/fetch_playlist.py
          python scripts/visualize_data.py --no-display
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 新規ファイルも含めて、一旦すべてステージングする
          git add -A
          
          # 2. ステージングされた変更（--cached）があるかチェック
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # 3. 変更があればコミットしてプッシュ
            git commit -m "chore: auto-update anime data and reports [skip ci]"
            git push
          fi
