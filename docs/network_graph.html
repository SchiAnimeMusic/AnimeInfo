<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimeInfo ネットワーク可視化</title>
  <link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.css" />
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: #f7f8fb;
      color: #222;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 24px;
    }
    .note {
      margin-bottom: 16px;
      color: #556;
    }
    #network {
      height: 80vh;
      border: 1px solid #d7dce5;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .status {
      margin-top: 12px;
      color: #445;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AnimeInfo ネットワーク可視化</h1>
    <div class="note">
      生成済みの JSON データを読み込み、Vis.js でノードとエッジを表示します。データ量が多いため、初期表示は上位ノードに絞り込んでいます。
    </div>
    <div class="controls">
      <button id="showTop">上位 600 ノード表示</button>
      <button id="showAll">全件表示</button>
      <button id="showChannels">チャンネルのみ</button>
      <button id="showAnime">アニメ作品のみ</button>
    </div>
    <div id="network"></div>
    <div id="status" class="status">データを読み込んでいます...</div>
  </div>

  <script src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const container = document.getElementById('network');
    const showTopBtn = document.getElementById('showTop');
    const showAllBtn = document.getElementById('showAll');
    const showChannelsBtn = document.getElementById('showChannels');
    const showAnimeBtn = document.getElementById('showAnime');

    let fullData = null;
    let network = null;

    async function loadGraphData() {
      try {
        const response = await fetch('../data/network_data.json');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        fullData = await response.json();
        updateNetwork();
        enableControls();
      } catch (error) {
        statusEl.textContent = `読み込みに失敗しました: ${error.message}`;
        console.error(error);
      }
    }

    function enableControls() {
      [showTopBtn, showAllBtn, showChannelsBtn, showAnimeBtn].forEach(button => {
        button.disabled = false;
      });
    }

    function computeDegree(data) {
      const degree = {};
      (data.edges || []).forEach(edge => {
        degree[edge.from] = (degree[edge.from] || 0) + 1;
        degree[edge.to] = (degree[edge.to] || 0) + 1;
      });
      return degree;
    }

    function selectGraph(data, nodeFilter) {
      const nodes = (data.nodes || []).filter(nodeFilter);
      const nodeIds = new Set(nodes.map(node => node.id));
      const edges = (data.edges || []).filter(edge => nodeIds.has(edge.from) && nodeIds.has(edge.to));
      return { nodes, edges };
    }

    function buildGraphData(data) {
      const nodes = new vis.DataSet(
        (data.nodes || []).map(node => ({
          ...node,
          title: node.label,
          color: node.type === 'channel' ? '#4f83cc' : '#f59e0b',
          font: {
            color: '#111827',
            face: 'Segoe UI, Yu Gothic UI, sans-serif',
            size: 14,
          },
          shape: node.shape || 'dot',
          size: node.type === 'channel' ? 18 : 14,
        }))
      );

      const edges = new vis.DataSet(
        (data.edges || []).map(edge => ({
          ...edge,
          title: edge.label || '関連動画',
          color: {
            color: '#9ca3af',
            highlight: '#4f83cc',
          },
          arrows: edge.arrows || 'to',
          font: {
            color: '#111827',
            size: 10,
          },
          smooth: {
            enabled: true,
            type: 'dynamic',
          },
          width: 1,
        }))
      );

      return { nodes, edges };
    }

    function renderGraph(data, label) {
      const graph = buildGraphData(data);
      const options = {
        physics: {
          stabilization: {
            enabled: true,
            iterations: 500,
            updateInterval: 25,
          },
          barnesHut: {
            gravitationalConstant: -8000,
            springLength: 120,
            springConstant: 0.04,
            damping: 0.09,
          },
        },
        interaction: {
          hover: true,
          tooltipDelay: 100,
          dragNodes: true,
          zoomView: true,
          dragView: true,
        },
        nodes: {
          borderWidth: 1,
          borderWidthSelected: 2,
        },
        edges: {
          smooth: true,
        },
        layout: {
          improvedLayout: true,
        },
      };

      if (network) {
        network.setData(graph);
        network.setOptions(options);
      } else {
        network = new vis.Network(container, graph, options);
      }
      statusEl.textContent = `${label} 表示中: ${data.nodes.length} ノード / ${data.edges.length} エッジ`;
    }

    function updateNetwork() {
      if (!fullData) return;
      const degree = computeDegree(fullData);
      const topIds = Object.entries(degree)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 600)
        .map(([id]) => Number(id));
      const filtered = selectGraph(fullData, node => topIds.includes(node.id));
      renderGraph(filtered, '上位 600 ノード');
    }

    showTopBtn.addEventListener('click', updateNetwork);
    showAllBtn.addEventListener('click', () => renderGraph(fullData, '全件'));
    showChannelsBtn.addEventListener('click', () => {
      const filtered = selectGraph(fullData, node => node.type === 'channel');
      renderGraph(filtered, 'チャンネルのみ');
    });
    showAnimeBtn.addEventListener('click', () => {
      const filtered = selectGraph(fullData, node => node.type === 'anime');
      renderGraph(filtered, 'アニメ作品のみ');
    });

    loadGraphData();
  </script>
</body>
</html>
